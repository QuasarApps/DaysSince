name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  debug:
    name: debug build + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: assembleDebug + unit tests
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon --stacktrace

  # Build the release variant and run release-mode lint in parallel with the
  # debug job so R8 / ProGuard rule regressions and policy-level lint findings
  # (icons, exported components, etc.) surface in PR CI instead of the night
  # before publish. The release APK here is intentionally unsigned — Play Store
  # uploads use a separately-signed build.
  release:
    name: release build + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: assembleRelease + lintRelease
        run: ./gradlew :app:assembleRelease :app:lintRelease --no-daemon --stacktrace

      - name: Upload release lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-release-report
          path: app/build/reports/lint-results-release.*
          if-no-files-found: ignore

  # Run the androidTest (instrumentation) suite on an emulator. Kept as its own job because it is
  # slower and heavier than the JVM jobs, so a flake here doesn't block the fast unit feedback.
  # Animations are disabled on the emulator to keep Compose UI assertions stable.
  instrumentation:
    name: instrumentation tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The emulator needs hardware acceleration; expose /dev/kvm to the runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload instrumentation test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: app/build/reports/androidTests/connected/**
          if-no-files-found: ignore
